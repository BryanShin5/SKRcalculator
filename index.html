<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데미지 계산기 (장비 연동)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #2c3e50; font-size: 24px; text-align: center; margin-top: 0; }
        .status { color: #27ae60; font-weight: bold; text-align: center; margin-bottom: 20px; font-size: 14px; }
        
        label { font-size: 14px; color: #34495e; display: block; margin-top: 12px; font-weight: bold; }
        select, input, button {
            width: 100%;
            padding: 10px;
            margin: 6px 0 12px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background-color: #2980b9; }
        .result {
            margin-top: 20px;
            font-size: 16px;
            color: #333;
            background: #eef2f3;
            padding: 15px;
            border-radius: 6px;
            line-height: 1.6;
        }
        .damage-val {
            color: #e74c3c;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⚔️ 데미지 계산기</h1>
    <p class="status">✓ 실시간 서버리스 시뮬레이터</p>
    
    <!-- 1. 캐릭터 이름 입력 -->
    <label for="stat_name">캐릭터 이름</label>
    <input type="text" id="stat_name" value="전설의 용사" oninput="calculateDamage()">

    <!-- 2. 장비 선택 드롭다운 -->
    <label for="eq_select">착용 장비</label>
    <select id="eq_select" onchange="calculateDamage()">
        <option value="none" data-atk="0" data-crit="0" data-amp="0">장비 없음</option>
        <option value="sword" data-atk="500" data-crit="10" data-amp="5">드래곤 슬레이어 (+500공, +10%치확, +5%피증)</option>
        <option value="staff" data-atk="300" data-crit="0" data-amp="25">대현자의 지팡이 (+300공, +25%피증)</option>
        <option value="dagger" data-atk="200" data-crit="25" data-amp="0">암살자의 단검 (+200공, +25%치확)</option>
    </select>

    <!-- 3. 상세 스탯 입력 변수들 -->
    <label for="atk">기본 공격력 (Base ATK)</label>
    <input type="number" id="atk" value="1500" min="0" oninput="calculateDamage()">

    <label for="crit-rate">기본 치명타 확률 (치확 %)</label>
    <input type="number" id="crit-rate" value="50" min="0" max="100" oninput="calculateDamage()">

    <label for="crit-dmg">치명타 피해 (치피 %)</label>
    <input type="number" id="crit-dmg" value="150" min="0" oninput="calculateDamage()">

    <label for="weak-atk">약점 공격 (약공 %)</label>
    <input type="number" id="weak-atk" value="120" min="100" oninput="calculateDamage()">

    <label for="dmg-buff">기본 피해 증폭 (%)</label>
    <input type="number" id="dmg-buff" value="10" min="0" oninput="calculateDamage()">

    <label for="def">적 방어력</label>
    <input type="number" id="def" value="500" min="0" oninput="calculateDamage()">

    <button onclick="calculateDamage()">데미지 계산하기</button>

    <!-- 화이트 카드 전용 결과 레이아웃 -->
    <div class="result" id="output">
        스탯을 입력하고 버튼을 눌러주세요.
    </div>
</div>

<script>
    function calculateDamage() {
        // 이름 데이터 매핑
        const charName = document.getElementById('stat_name').value || "캐릭터";

        // 드롭다운 속성 추출
        const eqSelect = document.getElementById('eq_select');
        const selectedOption = eqSelect.options[eqSelect.selectedIndex];
        const eqAtk = parseFloat(selectedOption.getAttribute('data-atk')) || 0;
        const eqCrit = parseFloat(selectedOption.getAttribute('data-crit')) || 0;
        const eqAmp = parseFloat(selectedOption.getAttribute('data-amp')) || 0;

        // 보너스 수치 연산 합산
        const baseAtk = parseFloat(document.getElementById('atk').value) || 0;
        const finalAtk = baseAtk + eqAtk;

        const baseCritRate = parseFloat(document.getElementById('crit-rate').value) || 0;
        const finalCritRate = Math.min(baseCritRate + eqCrit, 100) / 100;

        const critDmg = (parseFloat(document.getElementById('crit-dmg').value) || 0) / 100;
        const weakAtk = (parseFloat(document.getElementById('weak-atk').value) || 100) / 100;
        
        const baseAmp = parseFloat(document.getElementById('dmg-buff').value) || 0;
        const finalAmp = (baseAmp + eqAmp) / 100;
        
        const def = parseFloat(document.getElementById('def').value) || 0;

        // 전투 시뮬레이션 공식 연산
        let baseDamage = finalAtk - (def * 0.5);
        if (baseDamage < 1) baseDamage = 1;

        let normalDamage = baseDamage * weakAtk * (1 + finalAmp);
        let maxCritDamage = normalDamage * critDmg;
        let avgDamage = (normalDamage * (1 - finalCritRate)) + (maxCritDamage * finalCritRate);

        // 출력 타겟 바인딩
        document.getElementById('output').innerHTML = `
            <strong>[${charName}]</strong> 전투 분석 결과:<br>
            • 일반 적중 데미지: <strong>${Math.round(normalDamage).toLocaleString()}</strong><br>
            • 치명타 발생 데미지: <strong>${Math.round(maxCritDamage).toLocaleString()}</strong><br>
            <div style="border-top: 1px dashed #bbb; margin: 10px 0;"></div>
            🎯 종합 평균 기댓값: <span class="damage-val">${Math.round(avgDamage).toLocaleString()}</span>
        `;
    }

    // 렌더링 시 실시간 노출 초기화
    window.onload = calculateDamage;
</script>

</body>
</html>
