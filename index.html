<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데미지 계산기 (공격자 상세 설정)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #2c3e50; font-size: 24px; text-align: center; margin-top: 0; margin-bottom: 20px; }
        .grid-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-top: 5px solid #3498db;
        }
        .section.enemy { border-top-color: #e74c3c; }
        h2 { font-size: 16px; margin: 0 0 15px 0; color: #34495e; text-align: center; }
        .input-group {
            margin-bottom: 10px;
        }
        label { font-size: 13px; color: #7f8c8d; display: block; margin-bottom: 4px; font-weight: bold; }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .unit {
            position: absolute;
            right: 10px;
            color: #7f8c8d;
            font-size: 13px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background-color: #27ae60; }
        .result {
            margin-top: 20px;
            font-size: 16px;
            text-align: center;
            color: #333;
            background: #eef2f3;
            padding: 15px;
            border-radius: 6px;
            line-height: 1.6;
        }
        .damage-val {
            color: #e74c3c;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⚔️ 데미지 시뮬레이터</h1>
    
    <div class="grid-container">
        <!-- 공격자 설정 (상세 입력) -->
        <div class="section">
            <h2>공격자 (Attacker)</h2>
            
            <div class="input-group">
                <label for="atk">공격력</label>
                <div class="input-wrapper">
                    <input type="number" id="atk" value="1500" min="0">
                </div>
            </div>

            <div class="input-group">
                <label for="crit-rate">치명타 확률 (치확)</label>
                <div class="input-wrapper">
                    <input type="number" id="crit-rate" value="50" min="0" max="100">
                    <span class="unit">%</span>
                </div>
            </div>

            <div class="input-group">
                <label for="crit-dmg">치명타 피해 (치피)</label>
                <div class="input-wrapper">
                    <input type="number" id="crit-dmg" value="150" min="0">
                    <span class="unit">%</span>
                </div>
            </div>

            <div class="input-group">
                <label for="weak-atk">약점 공격 (약공 패시브/배율)</label>
                <div class="input-wrapper">
                    <input type="number" id="weak-atk" value="120" min="100">
                    <span class="unit">%</span>
                </div>
            </div>

            <div class="input-group">
                <label for="dmg-buff">피해 증폭</label>
                <div class="input-wrapper">
                    <input type="number" id="dmg-buff" value="10" min="0">
                    <span class="unit">%</span>
                </div>
            </div>
        </div>

        <!-- 방어자 설정 -->
        <div class="section enemy">
            <h2>방어자 (Defender)</h2>
            
            <div class="input-group">
                <label for="def">방어력</label>
                <div class="input-wrapper">
                    <input type="number" id="def" value="500" min="0">
                </div>
            </div>
            
            <p style="font-size: 11px; color:#95a5a6; line-height: 1.4; margin-top: 20px;">
                * 약점 공격은 기본 100% 상성에 추가 배율을 뜻합니다.<br>
                * 치명타는 기댓값과 최대 데미지를 모두 계산합니다.
            </p>
        </div>
    </div>

    <button onclick="calculateDamage()">데미지 계산하기</button>

    <div class="result" id="output">
        스탯을 입력하고 버튼을 눌러주세요.
    </div>
</div>

<script>
    function calculateDamage() {
        // 1. 입력값 가져오기 및 수치 변환 (퍼센트는 소수로 변경)
        const atk = parseFloat(document.getElementById('atk').value) || 0;
        const critRate = Math.min(parseFloat(document.getElementById('crit-rate').value) || 0, 100) / 100;
        const critDmg = (parseFloat(document.getElementById('crit-dmg').value) || 0) / 100;
        const weakAtk = (parseFloat(document.getElementById('weak-atk').value) || 100) / 100;
        const dmgBuff = (parseFloat(document.getElementById('dmg-buff').value) || 0) / 100;
        
        const def = parseFloat(document.getElementById('def').value) || 0;

        // 2. 기본 베이스 데미지 공식 계산 (공격력 - 방어력 방식 예시)
        let baseDamage = atk - (def * 0.5);
        if (baseDamage < 1) baseDamage = 1; // 최소 데미지 보정

        // 3. 약점 공격 및 피해 증폭 적용
        // (일반적인 게임 공식: 베이스 * 약점배율 * 피해증폭배율)
        let normalDamage = baseDamage * weakAtk * (1 + dmgBuff);

        // 4. 치명타 적용 데미지 수치 계산
        let maxCritDamage = normalDamage * critDmg; // 치명타가 터졌을 때 최고 데미지
        let avgDamage = (normalDamage * (1 - critRate)) + (maxCritDamage * critRate); // 치확을 반영한 평균 기댓값

        // 5. 결과 화면 출력 (소수점 반올림)
        document.getElementById('output').innerHTML = `
            일반 적중 데미지: <strong>${Math.round(normalDamage)}</strong><br>
            치명타 발생 데미지: <strong style="color:#d35400;">${Math.round(maxCritDamage)}</strong><br>
            <hr style="border:0; border-top:1px dashed #ccc; margin:10px 0;">
            🎯 종합 평균 기댓값: <span class="damage-val">${Math.round(avgDamage)}</span>
        `;
    }
</script>

</body>
</html>
