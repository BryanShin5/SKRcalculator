<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데미지 계산기 (가로 분리 레이아웃)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 800px; /* 가로 배치를 위해 전체 카드 카드 최대 너비를 확장 */
            width: 100%;
        }
        h1 { color: #2c3e50; font-size: 24px; text-align: center; margin-top: 0; margin-bottom: 5px; }
        .status { color: #27ae60; font-weight: bold; text-align: center; margin-bottom: 25px; font-size: 14px; }
        
        /* 공격자와 방어자를 가로로 배치하기 위한 그리드 컨테이너 */
        .flex-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 15px;
        }

        /* 세션 분리를 위한 서브 타이틀 스타일 */
        .section-title {
            font-size: 16px;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #eef2f3;
            font-weight: bold;
        }

        label { font-size: 13px; color: #5a738e; display: block; margin-top: 10px; font-weight: bold; }
        select, input, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }
.checkbox-container {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 12px; /* 상자와 글자 사이 간격 넓힘 */
            background-color: #f8f9fa; /* 클릭하기 좋게 부드러운 배경 배치 */
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed #cbd5e1;
            cursor: pointer;
        }
        .large-checkbox {
            width: 22px !important;    /* 가로 크기 확장 */
            height: 22px !important;   /* 세로 크기 확장 */
            margin: 0 !important;      /* 기본 마진 제거 */
            cursor: pointer;
            transform: scale(1.2);     /* 브라우저 호환성을 위해 스케일 업 */
        }
        .checkbox-label {
            font-size: 15px;           /* 글자 크기도 시원하게 변경 */
            color: #2c3e50;
            margin: 0;
            cursor: pointer;
            user-select: none;         /* 더블클릭 시 텍스트 블록 지정 방지 */
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
        }
        button:hover { background-color: #2980b9; }
        .result {
            margin-top: 20px;
            font-size: 16px;
            color: #333;
            background: #eef2f3;
            padding: 15px;
            border-radius: 6px;
            line-height: 1.6;
        }
        .damage-val {
            color: #e74c3c;
            font-size: 20px;
            font-weight: bold;
        }

        /* 화면이 좁은 모바일 기기에서는 세로로 자동 전환 */
        @media (max-width: 600px) {
            .flex-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⚔️ 세븐나이츠 계산기</h1>
    <p class="status">✓ 실시간 서버리스 시뮬레이터</p>
    
    <!-- 가로 배치를 위한 컨테이너 시작 -->
    <div class="flex-container">
        
        <!-- ==================== 좌측: 공격자 입력 섹션 ==================== -->
        <div class="column">
            <div class="section-title">🔴 공격자 설정 (Attacker)</div>

            <label for="stat_name">캐릭터 이름</label>
            <input type="text" id="stat_name" value="에반" oninput="calculateDamage()">

            <label for="eq_set">장비 세트효과</label>
            <select id="eq_set" onchange="calculateDamage()">
                <option value="none" data-weak-dmg="0" data-ignore-def="0" data-wpn-dmg="0">없음</option>
                <option value="chase" data-weak-dmg="30" data-ignore-def="0" data-wpn-dmg="0">추적 (+30% 약점 공격 피해량)</option>
                <option value="assassin" data-weak-dmg="0" data-ignore-def="15" data-wpn-dmg="0">암살 (+15% 방어력 무시)</option>
                <option value="avenger" data-weak-dmg="0" data-ignore-def="0" data-wpn-dmg="70">복수자 (+70% 피해 증폭)</option>
            </select>

            <label for="acc1">장신구1</label>
            <select id="acc1" onchange="calculateDamage()">
                <option value="crit" data-crit="10" data-weak-rate="0" data-wpn-dmg="0">치확 (+10% 치확)</option>
                <option value="weak" data-crit="0" data-weak-rate="12" data-wpn-dmg="0">약공 (+12% 약공 확률)</option>
                <option value="subjugate" data-crit="0" data-weak-rate="0" data-wpn-dmg="12">토벌 (+12% 피해 증폭)</option>
                <option value="siege" data-crit="0" data-weak-rate="0" data-wpn-dmg="10">공성 (+10% 피해 증폭)</option>
                <option value="dmg" data-crit="0" data-weak-rate="0" data-wpn-dmg="6">피증 (+6% 피해 증폭)</option>
            </select>

            <label for="acc2">장신구2</label>
            <select id="acc2" onchange="calculateDamage()">
                <option value="none" data-crit="0" data-weak-rate="0" data-wpn-dmg="0">장비 없음</option>
                <option value="crit" data-crit="10" data-weak-rate="0" data-wpn-dmg="0">치확 (+10% 치확)</option>
                <option value="weak" data-crit="0" data-weak-rate="12" data-wpn-dmg="0">약공 (+12% 약공 확률)</option>
                <option value="subjugate" data-crit="0" data-weak-rate="0" data-wpn-dmg="12">토벌 (+12% 피해 증폭)</option>
                <option value="siege" data-crit="0" data-weak-rate="0" data-wpn-dmg="10">공성 (+10% 피해 증폭)</option>
                <option value="dmg" data-crit="0" data-weak-rate="0" data-wpn-dmg="6">피증 (+6% 피해 증폭)</option>
            </select>

            <label for="atk">기본 공격력 (Base ATK)</label>
            <input type="number" id="atk" value="1500" min="0" oninput="calculateDamage()">

            <label for="crit-rate">기본 치명타 확률 (치확 %)</label>
            <input type="number" id="crit-rate" value="50" min="0" max="100" oninput="calculateDamage()">

            <label for="crit-dmg">치명타 피해 (치피 %)</label>
            <input type="number" id="crit-dmg" value="150" min="0" oninput="calculateDamage()">

            <label for="weak-atk">약점 공격 확률 (약공 %)</label>
            <input type="number" id="weak-atk" value="20" min="0" max="100" oninput="calculateDamage()">

            <label for="dmg-buff">전장 파쇄 (%)</label>
            <input type="number" id="dmg-buff" value="0" min="0" oninput="calculateDamage()">

            <label for="dmg-buff">전장 증폭 (%)</label>
            <input type="number" id="dmg-buff" value="0" min="0" oninput="calculateDamage()">
        </div>

        <!-- ==================== 우측: 방어자 입력 섹션 ==================== -->
        <div class="column">
            <div class="section-title">🔵 방어자 설정 (Defender)</div>

            <label for="stat_name">캐릭터 이름</label>
            <input type="text" id="stat_name" value="에반" oninput="calculateDamage()">

            <label for="def">적 방어력</label>
            <input type="number" id="def" value="0" min="0" oninput="calculateDamage()">

            <label for="def">적 체력</label>
            <input type="number" id="def" value="0" min="0" oninput="calculateDamage()">

            <label for="def">적 막기</label>
            <input type="number" id="def" value="0" min="0" oninput="calculateDamage()">

            <label for="def">적 받피감</label>
            <input type="number" id="def" value="0" min="0" oninput="calculateDamage()">

            <label for="def">적 탄성</label>
            <input type="number" id="def" value="0" min="0" oninput="calculateDamage()">

            <label for="def">적 방어력</label>
            <input type="number" id="def" value="500" min="0" oninput="calculateDamage()">

<div style="margin-top: 20px; display: flex; align-items: center; gap: 8px;">
    <label class="checkbox-container">
                <input type="checkbox" id="element_advantage" class="large-checkbox" onchange="calculateDamage()">
                <span class="checkbox-label">보스 여부</span>
            </label>
</div>
        </div>

    </div>
    <!-- 가로 배치를 위한 컨테이너 끝 -->

    <!-- ==================== 하단: 결과창 및 실행 버튼 ==================== -->
    <button onclick="calculateDamage()">데미지 계산하기</button>

    <div class="result" id="output">
        스탯을 입력하면 분석 결과가 여기에 표시됩니다.
    </div>
</div>

<script>
    let db = null;

// 비동기 fetch 함수 정의
async function loadJsonData() {
    try {
        // 동일 디렉토리 내의 characters.json 파일을 요청
        const response = await fetch('characters.json');
        
        if (!response.ok) {
            throw new Error(`HTTP 에러 발생: ${response.status}`);
        }
        
        db = await response.json();
        
        // 상태 표시 갱신 및 데이터 렌더링 시작
        document.getElementById('load-status').innerText = '✓ 외부 데이터 연동 완료';
        
    } catch (error) {
        console.error('JSON 로딩 실패:', error);
        document.getElementById('load-status').style.display = 'none';
        document.getElementById('error-status').style.display = 'block';
    }
}

// 수식 연산 엔진
function calculateDamage() {
    if (!db) return;

    const charName = document.getElementById('atk-char').value;
    const skillKey = document.getElementById('atk-skill').value;
    
    if (!charName || !skillKey) return;

    const char = db.characters[charName];
    const skill = char[skillKey];

    // 비정상 노드 및 공격 계수 부재 시 버프 판정 연산 차단
    if (!skill || skill.mult === 0 || skill.hits === 0) {
        document.getElementById('res-normal').innerText = "0 (버프형 스킬)";
        document.getElementById('res-crit').innerText = "0";
        document.getElementById('res-weak').innerText = "0";
        return;
    }

    const baseAtk = parseFloat(document.getElementById('atk-base').value) || 0;
    const myDef = parseFloat(document.getElementById('atk-def-stat').value) || 0;
    const critDmgPercent = parseFloat(document.getElementById('atk-crit-dmg').value) || 0;
    const enemyDef = parseFloat(document.getElementById('def-val').value) || 0;
    const enemyReduce = parseFloat(document.getElementById('def-reduce').value) || 0;

    const eqSet = document.getElementById('eq_set');
    const selectedEq = eqSet.options[eqSet.selectedIndex];
    const setWeakDmg = parseFloat(selectedEq.getAttribute('data-weak-dmg')) || 0;
    const setIgnoreDef = parseFloat(selectedEq.getAttribute('data-ignore-def')) || 0;
    const setWpnDmg = parseFloat(selectedEq.getAttribute('data-wpn-dmg')) || 0;

    let attackPower = baseAtk;
    let skillMultiplier = skill.multiplier || skill.atkmult || 0;

    // 패시브 방어 버프 처리
    let finalMyDef = myDef;
    if(char.passive && char.passive.allybuff && char.passive.allybuff.def) {
        finalMyDef = myDef * (1 + (char.passive.allybuff.def / 100));
    }

    // 패시브 피해 증폭 버프 처리
    let passiveAmp = 0;
    if(char.passive && char.passive.selfbuff && char.passive.selfbuff.debuffamp) {
        passiveAmp = char.passive.selfbuff.debuffamp;
    }

    // 디버프 추가 계수 핸들링
    if (charName === '세인' && document.getElementById('atk-debuff-target').checked) {
        skillMultiplier += (skill.debuffmult || 0);
    }

    let calcAtk = attackPower * (skillMultiplier / 100);

    // 에반형 방어 비례 추가타 스케일링
    if (charName === '에반' && skill.defmult) {
        calcAtk += finalMyDef * (skill.defmult / 100);
    }

    const finalEnemyDef = enemyDef * (1 - (setIgnoreDef / 100));
    let baseDamage = calcAtk - finalEnemyDef;
    if (baseDamage < 1) baseDamage = 1;

    const totalDmgAmp = 1 + ((setWpnDmg + passiveAmp) / 100);
    const totalDmgReduce = 1 - (enemyReduce / 100);

    const finalNormalDmg = Math.round(baseDamage * totalDmgAmp * totalDmgReduce);
    const finalCritDmg = Math.round(finalNormalDmg * (critDmgPercent / 100));
    const finalWeakDmg = Math.round(finalNormalDmg * (1.3 + (setWeakDmg / 100)));

    document.getElementById('res-normal').innerText = finalNormalDmg.toLocaleString();
    document.getElementById('res-crit').innerText = finalCritDmg.toLocaleString();
    document.getElementById('res-weak').innerText = finalWeakDmg.toLocaleString();
}

// 초기화 라이프사이클에 비동기 로더 바인딩
window.onload = loadJsonData;
</script>

</body>
</html>
