<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Test: Real 2-Character Inputs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 550px;
            width: 100%;
        }
        h1 { color: #2c3e50; font-size: 24px; text-align: center; margin-top: 0; }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-top: 5px solid #3498db;
        }
        .section.enemy { border-top-color: #e74c3c; }
        h2 { font-size: 16px; margin: 0 0 15px 0; color: #34495e; text-align: center; }
        label { font-size: 13px; color: #7f8c8d; display: block; margin-top: 8px; font-weight: bold; }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background-color: #27ae60; }
        .result {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            color: #333;
            background: #eef2f3;
            padding: 15px;
            border-radius: 6px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⚔️ Custom Battle Calculator</h1>
    
    <div class="grid-container">
        <!-- Character 1 Inputs -->
        <div class="section">
            <h2>Character 1 (Attacker)</h2>
            
            <label for="char1-name">Name:</label>
            <input type="text" id="char1-name" value="Hero A">

            <label for="char1-atk">Attack Power:</label>
            <input type="number" id="char1-atk" value="100" min="0">

            <label for="char1-level">Level multiplier:</label>
            <input type="number" id="char1-level" value="1" min="1">
        </div>

        <!-- Character 2 Inputs -->
        <div class="section enemy">
            <h2>Character 2 (Defender)</h2>
            
            <label for="char2-name">Name:</label>
            <input type="text" id="char2-name" value="Monster B">

            <label for="char2-def">Defense Power:</label>
            <input type="number" id="char2-def" value="40" min="0">

            <label for="char2-level">Level multiplier:</label>
            <input type="number" id="char2-level" value="1" min="1">
        </div>
    </div>

    <button onclick="calculateCombat()">Execute Simulation</button>

    <div class="result" id="output">
        Fill the fields and press calculate!
    </div>
</div>

<script>
    function calculateCombat() {
        // Retrieve Character 1 Form Data
        const name1 = document.getElementById('char1-name').value || "Character 1";
        const atk1 = parseFloat(document.getElementById('char1-atk').value) || 0;
        const lvl1 = parseFloat(document.getElementById('char1-level').value) || 1;
        
        // Retrieve Character 2 Form Data
        const name2 = document.getElementById('char2-name').value || "Character 2";
        const def2 = parseFloat(document.getElementById('char2-def').value) || 0;
        const lvl2 = parseFloat(document.getElementById('char2-level').value) || 1;

        // Process final scaled variables
        const totalAttack = atk1 * lvl1;
        const totalDefense = def2 * lvl2;

        // Formula execution
        let finalDamage = Math.round(totalAttack - (totalDefense * 0.5));
        if (finalDamage < 1) finalDamage = 1; // Safeguard minimum damage
        
        // Update display text dynamically
        document.getElementById('output').innerHTML = `
            <strong>${name1}</strong> attacks <strong>${name2}</strong>!<br>
            💥 Total Damage Dealt: <span style="color:#e74c3c;">${finalDamage}</span>
        `;
    }
</script>

</body>
</html>
