<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데미지 계산기</title>
    <script>
    let characterDb = null;

    //계산에 사용할 스탯 전역변수 할당
    let finalAtk = 0;
    let finalDef = 0;
    let finalHp = 0;
    let finalCritRate = 0;
    let finalCritDmg = 150;
    let finalWeakRate = 0;
    let finalWeakDmg = 130;
    let finalBreak = 0;
    let finalDmgAmp = 0;
    let finalBossAmp = 0;
    let finalAmp = 0;
    let finalDefIgnore = 0;
    let attackerName = null;
    let defenderName = null;

    //버프 수치 할당
    let atkBuff = 0;
    let defBuff = 0;
    let critrateBuff = 0;
    let critdmgBuff = 0;
    let weakrateBuff = 0;
    let weakdmgBuff = 0;
    let dmgampBuff = 0;
    let bossampBuff = 0;
    let defignoreBuff = 0;
    let enemyatkBuff = 0;
    let enemydefBuff = 0;
    let enemycritrateBuff = 0;
    let enemycritdmgBuff = 0;
    let enemyweakrateBuff = 0;
    let enemyweakdmgBuff = 0;
    let enemydmgampBuff = 0;
    let enemybossampBuff = 0;
    let enemydefignoreBuff = 0;
    
    async function fetchCharactersData() {
        try {
            const response = await fetch('characters.json');
            if (response.ok) {
                characterDb = await response.json();
                console.error("✓ JSON 스키마 매핑 완료");
            }
        } catch (e) {
            console.warn("JSON 매핑 실패: 로컬 웹서버 환경을 활성화하세요.");
        }
    }

    function processSkillView() {
        const nameInput = document.querySelector('#atk_name');
        const defNameInput = document.querySelector('#def_name');
        attackerName = nameInput ? nameInput.value.trim() : '에반';
        defenderName = defNameInput ? defNameInput.value.trim() : '에반';
        let skill1Name = "스킬 1";
        let skill2Name = "스킬 2";
        let hero = null;
        // 1. 캐릭터 데이터 로딩
        if (characterDb && characterDb.characters && characterDb.characters[attackerName]) {
            hero = characterDb.characters[attackerName];
            if (hero.skill1) skill1Name = hero.skill1.name;
            if (hero.skill2) skill2Name = hero.skill2.name;
        }

        // 2. 등록되지 않았을 경우 유저에게 공지
        const out1 = document.getElementById('skill1-output');
        const out2 = document.getElementById('skill2-output');
        const displayBox = document.getElementById('display-box');
        if (!characterDb || !characterDb.characters || !characterDb.characters[attackerName]) {
            if (out1 && out2) {
                out1.innerText = "❌ 등록되지 않은 캐릭터입니다.";
                out2.innerText = "❌ 등록되지 않은 캐릭터입니다.";
            } else if (displayBox) {
                displayBox.innerHTML = `<strong>💥 예상 데미지 결과</strong><br><span class="damage-val">❌ 등록되지 않은 캐릭터입니다. 데이터 파일을 확인하세요.</span>`;
            }
            return;
        }
        
        if (out1 && out2) {
            if(hero.skill1){
                const atkMult = parseFloat(hero?.skill1?.atkmult) || 0; 
                const defMult = parseFloat(hero?.skill1?.defmult) || 0; 
                const hpMult = parseFloat(hero?.skill1?.hpmult) || 0; 
                out1.innerText = `[${skill1Name}] : ${calculateDamage(atkMult,defMult,hpMult)}`;
            }
            if(hero.skill2){
                const atkMult = parseFloat(hero?.skill2?.atkmult) || 0; 
                const defMult = parseFloat(hero?.skill2?.defmult) || 0; 
                const hpMult = parseFloat(hero?.skill2?.hpmult) || 0; 
                out2.innerText = `[${skill2Name}] : ${calculateDamage(atkMult,defMult,hpMult)}`;
            }
        } else if (displayBox) {
            displayBox.innerHTML = `<strong>💥 예상 데미지 결과</strong><br> • 스킬 1 피해량: <span id="skill1-output" class="damage-val">[${skill1Name}] 타격 준비 완료</span><br> • 스킬 2 피해량: <span id="skill2-output" class="damage-val">[${skill2Name}] 타격    준비 완료</span>`;
        }
    }
    function buffIterator(){
        const atkPetInput = document.querySelector('#atk-pet-name');
        const defPetInput = document.querySelector('#def-pet-name');
        attackerPetName = atkPetInput ? atkPetInput.value.trim() : '';
        defenderPetName = defPetInput ? defNameInput.value.trim() : '';
        let pet  = null;
        // 1.펫 데이터 로딩
        if (characterDb && characterDb.pets && characterDb.pets[attackerPetName]) {
            pet = characterDb.pets[attackerPetName];
            if (pet.buff1){
                if(pet.buff1.target==="enemy"){
                    if(buff1.atk && (buff1.type === characterDb.characters[defenderName].stat.type)){ enemyatkBuff = enemyatkBuff - parseFloat(buff1.atk);}
                    if(buff1.def){ enemydefBuff = enemydefBuff - parseFloat(buff1.def);}
                    if(buff1.critrate){ enemycritrateBuff = enemycritrateBuff - parseFloat(buff1.critrate);}
                    if(buff1.critdmg){ enemycritdmgBuff = enemycritdmgBuff - parseFloat(buff1.critdmg);}
                    if(buff1.weakrate){ enemyweakrateBuff = enemyweakrateBuff - parseFloat(buff1.weakrate);}
                    if(buff1.weakdmg){ enemyweakdmgBuff = enemyweakdmgBuff - parseFloat(buff1.weakdmg);}
                    if(buff1.dmgamp){ enemydmgampBuff = enemydmgampBuff - parseFloat(buff1.dmgamp);}
                    if(buff1.dmgamp && (buff1.type === "boss"){ enemybossampBuff = enemybossampBuff - parseFloat(buff1.dmgamp);}
                }
                else{
                    if(buff1.atk && (buff1.type === characterDb.characters[attackerName].stat.type)){ atkBuff = atkBuff + parseFloat(buff1.atk);}
                    if(buff1.def){ defBuff = defBuff + parseFloat(buff1.def);}
                    if(buff1.critrate){ critrateBuff = critrateBuff + parseFloat(buff1.critrate);}
                    if(buff1.critdmg){ critdmgBuff = critdmgBuff + parseFloat(buff1.critdmg);}
                    if(buff1.weakrate){ weakrateBuff = weakrateBuff + parseFloat(buff1.weakrate);}
                    if(buff1.weakdmg){ weakdmgBuff = weakdmgBuff + parseFloat(buff1.weakdmg);}
                    if(buff1.dmgamp){ dmgampBuff = dmgampBuff + parseFloat(buff1.dmgamp);}
                    if(buff1.dmgamp && (buff1.type === "boss"){ bossampBuff = bossampBuff + parseFloat(buff1.dmgamp);}
                }
            } 
            if (pet.buff2){
                if(pet.buff2.target==="enemy"){
                    if(buff2.atk && (buff2.type === characterDb.characters[defenderName].stat.type)){ enemyatkBuff = enemyatkBuff - parseFloat(buff2.atk);}
                    if(buff2.def){ enemydefBuff = enemydefBuff - parseFloat(buff2.def);}
                    if(buff2.critrate){ enemycritrateBuff = enemycritrateBuff - parseFloat(buff2.critrate);}
                    if(buff2.critdmg){ enemycritdmgBuff = enemycritdmgBuff - parseFloat(buff2.critdmg);}
                    if(buff2.weakrate){ enemyweakrateBuff = enemyweakrateBuff - parseFloat(buff2.weakrate);}
                    if(buff2.weakdmg){ enemyweakdmgBuff = enemyweakdmgBuff - parseFloat(buff2.weakdmg);}
                    if(buff2.dmgamp){ enemydmgampBuff = enemydmgampBuff - parseFloat(buff2.dmgamp);}
                    if(buff2.dmgamp && (buff2.type === "boss"){ enemybossampBuff = enemybossampBuff - parseFloat(buff2.dmgamp);}
                }
                else{
                    if(buff2.atk && (buff2.type === characterDb.characters[attackerName].stat.type)){ atkBuff = atkBuff + parseFloat(buff2.atk);}
                    if(buff2.def){ defBuff = defBuff + parseFloat(buff2.def);}
                    if(buff2.critrate){ critrateBuff = critrateBuff + parseFloat(buff2.critrate);}
                    if(buff2.critdmg){ critdmgBuff = critdmgBuff + parseFloat(buff2.critdmg);}
                    if(buff2.weakrate){ weakrateBuff = weakrateBuff + parseFloat(buff2.weakrate);}
                    if(buff2.weakdmg){ weakdmgBuff = weakdmgBuff + parseFloat(buff2.weakdmg);}
                    if(buff2.dmgamp){ dmgampBuff = dmgampBuff + parseFloat(buff2.dmgamp);}
                    if(buff2.dmgamp && (buff2.type === "boss"){ bossampBuff = bossampBuff + parseFloat(buff2.dmgamp);}
                }
            } 
        }
    }
    function calculateStat() {
        const acc1Element = document.getElementById('acc1');
        const selectedAcc1 = acc1Element ? acc1Element.options[acc1Element.selectedIndex] : null;
        // 속성이 없을 경우를 대비해 기본값 0 처리
        const acc1CritRate = selectedAcc1 ? (parseFloat(selectedAcc1.getAttribute('data-crit')) || 0) : 0;
        const acc1WeakRate = selectedAcc1 ? (parseFloat(selectedAcc1.getAttribute('data-weak-rate')) || 0) : 0;
        const acc1DmgAmp  = selectedAcc1 ? (parseFloat(selectedAcc1.getAttribute('data-wpn-dmg')) || 0) : 0;
        const acc1BossAmp  = selectedAcc1 ? (parseFloat(selectedAcc1.getAttribute('data-boss-dmg')) || 0) : 0;
        // --- 장신구 2 데이터 추출 ---
        const acc2Element = document.getElementById('acc2');
        const selectedAcc2 = acc2Element ? acc2Element.options[acc2Element.selectedIndex] : null;
        const acc2CritRate = selectedAcc2 ? (parseFloat(selectedAcc2.getAttribute('data-crit')) || 0) : 0;
        const acc2WeakRate = selectedAcc2 ? (parseFloat(selectedAcc2.getAttribute('data-weak-rate')) || 0) : 0;
        const acc2DmgAmp  = selectedAcc2 ? (parseFloat(selectedAcc2.getAttribute('data-wpn-dmg')) || 0) : 0;
        const acc2BossAmp  = selectedAcc1 ? (parseFloat(selectedAcc2.getAttribute('data-boss-dmg')) || 0) : 0;
        // 장비 세트옵 추출
        const gearElement = document.getElementById('eq_set');
        const selectedgear = gearElement ? gearElement.options[gearElement.selectedIndex] : null;
        const gearWeakDmg = selectedgear ? (parseFloat(selectedgear.getAttribute('data-weak-dmg')) || 0) : 0;
        const gearDefIgn = selectedgear ? (parseFloat(selectedgear.getAttribute('data-ignore-def')) || 0) : 0;
        const gearDmgAmp = selectedgear ? (parseFloat(selectedgear.getAttribute('data-wpn-dmg')) || 0) : 0;
        const gearBossAmp = selectedgear ? (parseFloat(selectedgear.getAttribute('data-boss-dmg')) || 0) : 0;
        
        const heroData = characterDb?.characters?.[attackerName];
        const heroCritRate = parseFloat(heroData?.passive?.critrateconst) || 0;
        const Atk = parseFloat(document.getElementById('atk').value) || 0;
        const Def = parseFloat(document.getElementById('atk-def').value) || 0;
        const Hp = parseFloat(document.getElementById('atk-hp').value) || 0;
        const baseAtk = parseFloat(heroData?.stat?.atk) || 0;
        const baseDef = parseFloat(heroData?.stat?.def) || 0;
        const baseHp = parseFloat(heroData?.stat?.hp) || 0;
        const petAtk  = parseFloat(document.getElementById('atk-pet-atk')?.value) / 100 || 0; 
        const petDef  = parseFloat(document.getElementById('atk-pet-def')?.value) / 100 || 0; 
        const petHp  = parseFloat(document.getElementById('atk-pet-hp')?.value) / 100 || 0; 
        const critRate = parseFloat(document.getElementById('crit-rate').value) || 0;
        const weakRate = parseFloat(document.getElementById('weak-rate').value) || 0;

        const petStar = parseInt(document.getElementById('atk-pet-star')?.value) || 0;
        const petLevel = parseInt(document.getElementById('atk-pet-level')?.value) || 0;
        let petBaseAtk = 0;
        let petBaseDef = 0;
        let petBaseHp = 0;
        if(petStar === 4){
            petBaseAtk = 14 * petLevel + 231;
            petBaseDef = 8 * petLevel + 140;
            petBaseHp = 46 * petLevel + 774;
        }
        else if(petStar === 5){
            petBaseAtk = 18 * petLevel + 301;
            petBaseDef = 11 * petLevel + 182;
            petBaseHp = 60 * petLevel + 1007;
        }
        else if(petStar === 6){
            petBaseAtk = 32 * petLevel + 404;
            petBaseDef = 20 * petLevel + 244;
            petBaseHp = 108 * petLevel + 1355;
        }
        //진형 체크
        const frontInputs = document.querySelectorAll('.front-hero');
        const frontHeroes = Array.from(frontInputs).map(input => input.value.trim());
        const backInputs = document.querySelectorAll('.back-hero');
        const backHeroes = Array.from(backInputs).map(input => input.value.trim());

        const inFront = frontHeroes.includes(attackerName);
        const inBack = backHeroes.includes(attackerName);  
        
        let formationAtk = 0;
        let formationDef = 0;
        const formationElement = document.getElementById('formation-select');
        const selectedFormation = formationElement ? formationElement.options[formationElement.selectedIndex] : null;
        const formationId = selectedFormation.id;
        console.error(inFront, inBack, frontHeroes, backHeroes,formationId);
        if(inBack){
            if(formationId === "1"){formationAtk = 42;}
            if(formationId === "2"){formationAtk = 21;}
            if(formationId === "3"){formationAtk = 14;}
            if(formationId === "4"){formationAtk = 10.5;}
        }
        if(inFront){
            if(formationId === "4"){formationDef = 42;}
            if(formationId === "3"){formationDef = 21;}
            if(formationId === "2"){formationDef = 14;}
            if(formationId === "1"){formationDef = 10.5;}
        }
        finalAtk = ((Atk + (baseAtk*petAtk)) + petBaseAtk + (baseAtk * formationAtk / 100)) * ((100 + atkBuff) / 100);
        finalDef = (Def + petBaseDef + (baseDef * petDef) + ((baseDef * formationDef / 100))) * ((100 + defBuff) / 100);
        finalHp = Hp + petBaseHp + (baseHp * petHp);
        finalCritRate = Math.min((critRate + acc1CritRate + acc2CritRate + critrateBuff),100) ;
        finalCritDmg = parseFloat(document.getElementById('crit-dmg').value) || 150;
        finalCritDmg = finalCritDmg + critdmgBuff;
        finalWeakDmg = 130 + gearWeakDmg + weakdmgBuff;
        finalWeakRate = Math.min((weakRate + acc1WeakRate + acc2WeakRate + weakrateBuff),100) ;
        finalDefIgnore = gearDefIgn + defignoreBuff;
        finalDmgAmp = acc1DmgAmp + acc2DmgAmp + gearDmgAmp + dmgampBuff;
        finalBossAmp = acc1BossAmp + acc2BossAmp + gearBossAmp + bossampBuff;
        if(defenderName === "보스"){
            finalDmgAmp = finalDmgAmp + finalBossAmp;
        }
        finalAmp =  parseFloat(document.getElementById('dmg-buff').value) || 0;
        return false;
    }

    function calculateDamage(atkmult,defmult,hpmult){
        console.error(atkmult, defmult, hpmult)
        calculateStat();
        console.error(finalAtk, finalDef, finalHp, finalCritRate, finalCritDmg, finalWeakRate, finalWeakDmg, finalDmgAmp, finalBossAmp, finalDefIgnore, finalBreak, attackerName, defenderName);
        console.error((finalAtk * (atkmult/100) + finalDef * (defmult/100) + finalHp * (hpmult/100)) * ((100 + finalDmgAmp) / 100) * ((100 + finalAmp) / 100));
        const baseDmg = (finalAtk * (atkmult/100) + finalDef * (defmult/100) + finalHp * (hpmult/100)) * ((100 + finalDmgAmp) / 100) * ((100 + finalAmp) / 100);
        console.error(baseDmg * finalCritDmg / 100);
        console.error(baseDmg * finalWeakDmg / 100);
        console.error(baseDmg * finalCritDmg / 100 * finalWeakDmg / 100);
        return (finalAtk * (atkmult/100) + finalDef * (defmult/100) + finalHp * (hpmult/100)) * ((100 + finalDmgAmp) / 100) * ((100 + finalAmp) / 100);
    }
    function renderFormation(selectedOption) {
      const displayArea = document.getElementById('formation-display-area');

      // "2-3" 문자열을 잘라 숫자로 분리 (frontCount = 2, backCount = 3)
      const [frontCount, backCount] = selectedOption.split('-').map(Number);

      // 전방 입력창 문자열 생성
      let frontInputs = '';
      for (let i = 1; i <= frontCount; i++) {
        frontInputs += `<div class="hero-card"><input type="text" class="front-hero" placeholder="전열 ${i}">
        <div class="checkbox-row">
        <label class="skill-label"><input type="checkbox" class="front-skill1"> 스킬1</label>
        <label class="skill-label"><input type="checkbox" class="front-skill2"> 스킬2</label>
      </div>
    </div>`;
      }

      // 후방 입력창 문자열 생성
      let backInputs = '';
      for (let i = 1; i <= backCount; i++) {
        backInputs += `<div class="hero-card"><input type="text" class="back-hero" placeholder="후열 ${i}"><div class="checkbox-row">
        <label class="skill-label"><input type="checkbox" class="front-skill1"> 스킬1</label>
        <label class="skill-label"><input type="checkbox" class="front-skill2"> 스킬2</label>
      </div>
    </div>`;
      }

      // 지정한 영역의 innerHTML을 교체하여 단 하나의 화면만 렌더링
      displayArea.innerHTML = `
        <h4>[전열 ${frontCount} / 후열 ${backCount}] 영웅 입력</h4>
        <div class="form-group">
    <label class="row-title">후열 영웅 (${backCount}명)</label>
    <div class="row-flex-container">${backInputs}</div>
  </div>
  <div class="form-group">
    <label class="row-title">전열 영웅 (${frontCount}명)</label>
    <div class="row-flex-container">${frontInputs}</div>
  </div>
      `;
    }

    function renderDefFormation(selectedOption) {
      const displayArea = document.getElementById('defformation-display-area');

      // "2-3" 문자열을 잘라 숫자로 분리 (frontCount = 2, backCount = 3)
      const [frontCount, backCount] = selectedOption.split('-').map(Number);

      // 전방 입력창 문자열 생성
      let frontInputs = '';
      for (let i = 1; i <= frontCount; i++) {
        frontInputs += `<div class="hero-card"><input type="text" class="front-def-hero" placeholder="전열 ${i}">
        <div class="checkbox-row">
        <label class="skill-label"><input type="checkbox" class="front-skill1"> 스킬1</label>
        <label class="skill-label"><input type="checkbox" class="front-skill2"> 스킬2</label>
      </div>
    </div>`;
      }

      // 후방 입력창 문자열 생성
      let backInputs = '';
      for (let i = 1; i <= backCount; i++) {
        backInputs += `<div class="hero-card"><input type="text" class="back-def-hero" placeholder="후열 ${i}"><div class="checkbox-row">
        <label class="skill-label"><input type="checkbox" class="front-skill1"> 스킬1</label>
        <label class="skill-label"><input type="checkbox" class="front-skill2"> 스킬2</label>
      </div>
    </div>`;
      }

      // 지정한 영역의 innerHTML을 교체하여 단 하나의 화면만 렌더링
      displayArea.innerHTML = `
        <h4>[전열 ${frontCount} / 후열 ${backCount}] 영웅 입력</h4>
        <div class="form-group">
    <label class="row-title">후열 영웅 (${backCount}명)</label>
    <div class="row-flex-container">${backInputs}</div>
  </div>
  <div class="form-group">
    <label class="row-title">전열 영웅 (${frontCount}명)</label>
    <div class="row-flex-container">${frontInputs}</div>
  </div>
      `;
    }
    window.onload = fetchCharactersData;
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 800px; /* 가로 배치를 위해 전체 카드 카드 최대 너비를 확장 */
            width: 100%;
        }
        h1 { color: #2c3e50; font-size: 24px; text-align: center; margin-top: 0; margin-bottom: 5px; }
        .status { color: #27ae60; font-weight: bold; text-align: center; margin-bottom: 25px; font-size: 14px; }
        
        /* 공격자와 방어자를 가로로 배치하기 위한 그리드 컨테이너 */
        .flex-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 15px;
        }

        /* 세션 분리를 위한 서브 타이틀 스타일 */
        .section-title {
            font-size: 16px;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #eef2f3;
            font-weight: bold;
        }

        label { font-size: 13px; color: #5a738e; display: block; margin-top: 10px; font-weight: bold; }
        select, input, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }
.checkbox-container {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 12px; /* 상자와 글자 사이 간격 넓힘 */
            background-color: #f8f9fa; /* 클릭하기 좋게 부드러운 배경 배치 */
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed #cbd5e1;
            cursor: pointer;
        }
        .large-checkbox {
            width: 22px !important;    /* 가로 크기 확장 */
            height: 22px !important;   /* 세로 크기 확장 */
            margin: 0 !important;      /* 기본 마진 제거 */
            cursor: pointer;
            transform: scale(1.2);     /* 브라우저 호환성을 위해 스케일 업 */
        }
        .checkbox-label {
            font-size: 15px;           /* 글자 크기도 시원하게 변경 */
            color: #2c3e50;
            margin: 0;
            cursor: pointer;
            user-select: none;         /* 더블클릭 시 텍스트 블록 지정 방지 */
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
        }
        button:hover { background-color: #2980b9; }
        .result {
            margin-top: 20px;
            font-size: 16px;
            color: #333;
            background: #eef2f3;
            padding: 15px;
            border-radius: 6px;
            line-height: 1.6;
        }
        .damage-val {
            color: #e74c3c;
            font-size: 20px;
            font-weight: bold;
        }

        .pet-container-block {
            margin-top: 20px;
            padding: 20px;
            background-color: #fcfcfd;
            border: 1px solid #eef2f3;
            border-radius: 8px;
        }
        /* 영웅 1명 단위의 가로 정렬 상자 */
/* 영웅 한 명의 입력 세트를 감싸는 카드 (충분한 가로 폭 확보) */
.hero-card {
  display: flex;
  align-items: center;       /* 세로 기준 완벽히 가운데 정렬 */
  background: #ffffff;
  padding: 12px 16px;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  margin-bottom: 12px;       /* 카드와 카드 사이의 세로 간격 */
  width: 100%;
  max-width: 420px;          /* 카드가 너무 넓어지지 않도록 제한 */
  box-sizing: border-box;
}

/* 이름 입력창 스타일 */
.hero-card input[type="text"] {
  width: 130px;              /* 입력창 너비 */
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  margin-right: 20px;        /* 입력창과 체크박스 사이의 여백 */
  font-size: 14px;
}

/* 체크박스들을 가로로 나열하는 컨테이너 */
.checkbox-row {
  display: flex;
  flex-direction: row;       /* 무조건 가로 방향 정렬 */
  gap: 15px;                 /* 스킬1과 스킬2 사이의 간격 */
}

/* 체크박스 개별 레이블 (글자 줄바꿈 절대 방지) */
.skill-label {
  display: flex;
  align-items: center;
  font-size: 14px;
  color: #333;
  cursor: pointer;
  white-space: nowrap;       /* 🔥 핵심: 글자가 공간 부족으로 아래로 떨어지는 것을 절대 방지 */
}

/* 체크박스 자체와 '스킬 1' 글자 사이의 간격 */
.skill-label input[type="checkbox"] {
  margin-right: 6px;
  cursor: pointer;
  width: 16px;               /* 체크박스 크기 최적화 */
  height: 16px;
}

        /* 화면이 좁은 모바일 기기에서는 세로로 자동 전환 */
        @media (max-width: 600px) {
            .flex-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⚔️ 세븐나이츠 계산기</h1>
    
    <!-- 가로 배치를 위한 컨테이너 시작 -->
    <div class="flex-container">
        
        <!-- ==================== 좌측: 공격자 입력 섹션 ==================== -->
        <div class="column">
            <div class="section-title">🔴 공격자 설정</div>

            <label for="atk_name">캐릭터 이름</label>
            <input type="text" id="atk_name">

            <label for="eq_set">장비 세트효과</label>
            <select id="eq_set">
                <option value="none" data-weak-dmg="0" data-ignore-def="0" data-wpn-dmg="0" data-boss-dmg="0">없음</option>
                <option value="chase" data-weak-dmg="30" data-ignore-def="0" data-wpn-dmg="0" data-boss-dmg="0">추적 (+30% 약점 공격 피해량)</option>
                <option value="assassin" data-weak-dmg="0" data-ignore-def="15" data-wpn-dmg="0" data-boss-dmg="0">암살 (+15% 방어력 무시)</option>
                <option value="avenger" data-weak-dmg="0" data-ignore-def="0" data-wpn-dmg="30" data-boss-dmg="40">복수자 (+70% 피해 증폭)</option>
            </select>

            <label for="acc1">장신구1</label>
            <select id="acc1">
                <option value="none" data-crit="0" data-weak-rate="0" data-wpn-dmg="0" data-boss-dmg="0">장비 없음</option>
                <option value="crit" data-crit="10" data-weak-rate="0" data-wpn-dmg="0" data-boss-dmg="0">치확 (+10% 치확)</option>
                <option value="weak" data-crit="0" data-weak-rate="12" data-wpn-dmg="0" data-boss-dmg="0">약공 (+12% 약공 확률)</option>
                <option value="subjugate" data-crit="0" data-weak-rate="0" data-wpn-dmg="0" data-boss-dmg="12">토벌 (+12% 피해 증폭)</option>
                <option value="siege" data-crit="0" data-weak-rate="0" data-wpn-dmg="10" data-boss-dmg="0">공성 (+10% 피해 증폭)</option>
                <option value="dmg" data-crit="0" data-weak-rate="0" data-wpn-dmg="6" data-boss-dmg="0">피증 (+6% 피해 증폭)</option>
            </select>

            <label for="acc2">장신구2</label>
            <select id="acc2">
                <option value="none" data-crit="0" data-weak-rate="0" data-wpn-dmg="0" data-boss-dmg="0">장비 없음</option>
                <option value="crit" data-crit="10" data-weak-rate="0" data-wpn-dmg="0" data-boss-dmg="0">치확 (+10% 치확)</option>
                <option value="weak" data-crit="0" data-weak-rate="12" data-wpn-dmg="0" data-boss-dmg="0">약공 (+12% 약공 확률)</option>
                <option value="subjugate" data-crit="0" data-weak-rate="0" data-wpn-dmg="0" data-boss-dmg="12">토벌 (+12% 피해 증폭)</option>
                <option value="siege" data-crit="0" data-weak-rate="0" data-wpn-dmg="10" data-boss-dmg="0">공성 (+10% 피해 증폭)</option>
                <option value="dmg" data-crit="0" data-weak-rate="0" data-wpn-dmg="6" data-boss-dmg="0">피증 (+6% 피해 증폭)</option>
            </select>

            <label for="atk">공격력</label>
            <input type="number" id="atk" value="0" min="0">

            <label for="atk-def">방어력</label>
            <input type="number" id="atk-def" value="0" min="0">

            <label for="atk-hp">체력</label>
            <input type="number" id="atk-hp" value="0" min="0">

            <label for="crit-rate">기본 치명타 확률 (치확 %)</label>
            <input type="number" id="crit-rate" value="0" min="0" max="100">

            <label for="crit-dmg">치명타 피해 (치피 %)</label>
            <input type="number" id="crit-dmg" value="150" min="0">

            <label for="weak-rate">약점 공격 확률 (약공 %)</label>
            <input type="number" id="weak-rate" value="20" min="0" max="100">

            <label for="break">전장 파쇄 (%)</label>
            <input type="number" id="break" value="0" min="0">

            <label for="dmg-buff">전장 증폭 (%)</label>
            <input type="number" id="dmg-buff" value="0" min="0">

            <h2>진형을 선택하세요</h2>
  
  <select id="formation-select" onchange="renderFormation(this.value)">
  <option value="" id = "0">-- 공격팀 진형 선택 --</option>
  <option value="4-1" id = "1">보호 진형</option>
  <option value="3-2" id = "2">밸런스 진형</option>
  <option value="2-3" id = "3">기본 진형</option>
  <option value="1-4" id = "4">공격 진형</option>
</select>

  <!-- 2단계: 렌더링 결과가 출력될 영역 -->
  <div id='formation-display-area'>
    <p class="empty-message">포메이션 버튼을 클릭하면 입력 창이 여기에 표시됩니다.</p>
  </div>
        </div>

        <!-- ==================== 우측: 방어자 입력 섹션 ==================== -->
        <div class="column">
            <div class="section-title">🔵 방어자 설정</div>

            <label for="def_name">캐릭터 이름(보스는 보스 라고 써주세요)</label>
            <input type="text" id="def_name">

            <label for="def">적 방어력</label>
            <input type="number" id="def" value="0" min="0">

            <label for="hp">적 체력</label>
            <input type="number" id="hp" value="0" min="0">

            <label for="guard">적 막기</label>
            <input type="number" id="guard" value="0" min="0">

            <label for="dmg-red">적 받피감</label>
            <input type="number" id="dmg-red" value="0" min="0">

            <label for="ela">적 탄성</label>
            <input type="number" id="ela" value="0" min="0">

             <select id="defformation-select" onchange="renderDefFormation(this.value)">
  <option value="">-- 방어팀 진형 선택 --</option>
  <option value="4-1" id = "1">보호 진형</option>
  <option value="3-2" id = "2">밸런스 진형</option>
  <option value="2-3" id = "3">기본 진형</option>
  <option value="1-4" id = "4">공격 진형</option>
</select>

  <!-- 2단계: 렌더링 결과가 출력될 영역 -->
  <div id='defformation-display-area'>
    <p class="empty-message">포메이션 버튼을 클릭하면 입력 창이 여기에 표시됩니다.</p>
  </div>
            <div class="pet-container-block">
    <div class="section-title">🐾 펫 설정 </div>
    <div class="flex-container" style="margin-bottom: 0;">
        <!-- 공격자 전용 펫 정보 블록 -->
        <div class="column">
            <label for="atk-pet-name">공격자 펫 이름</label>
            <input type="text" id="atk-pet-name" value="루">

            <label for="atk-pet-star">공격자 펫 등급</label>
            <input type="number" id="atk-pet-star" value="0" min="4" max = "6">

            <label for="atk-pet-level">공격자 펫 강화</label>
            <input type="number" id="atk-pet-level" value="0" min="0" max = "5">
            
            <label for="atk-pet-atk">공격자 펫 공격 잠재</label>
            <input type="number" id="atk-pet-atk" value="0" min="0">

            <label for="atk-pet-def">공격자 펫 방어 잠재</label>
            <input type="number" id="atk-pet-def" value="0" min="0">

            <label for="atk-pet-hp">공격자 펫 체력 잠재</label>
            <input type="number" id="atk-pet-hp" value="0" min="0">
        </div>
        
        <!-- 방어자 전용 펫 정보 블록 -->
        <div class="column">
            <label for="def-pet-name">방어자 펫 이름</label>
            <input type="text" id="def-pet-name" value="이린">

            <label for="def-pet-star">방어자 펫 등급 (별 등급)</label>
            <input type="number" id="atk-pet-star" value="0" min="4" max = "6">

            <label for="def-pet-level">방어자 펫 강화</label>
            <input type="number" id="atk-pet-level" value="0" min="0" max = "5">

            <label for="def-pet-atk">방어자 펫 공격 잠재</label>
            <input type="number" id="def-pet-atk" value="0" min="0">

            <label for="def-pet-def">방어자 펫 방어 잠재</label>
            <input type="number" id="def-pet-def" value="0" min="0">

            <label for="def-pet-hp">방어자 펫 체력 잠재</label>
            <input type="number" id="def-pet-hp" value="0" min="0">
        </div>
        </div>
        </div>
        </div>
    </div>

    <!-- 최종 결과 모의 단추 버튼 -->
    <button type="button" style="width: 100%;" onclick="processSkillView()">💥 데미지 계산하기</button>

    <!-- 가독성을 위해 개별 스킬 레이블 형태로 재구성된 결과 노드 -->
    <div class="result" id="display-box">
        <strong>💥 예상 데미지 결과</strong><br>
        • 스킬 1 피해량: <span id="skill1-output" class="damage-val">-</span><br>
        • 스킬 2 피해량: <span id="skill2-output" class="damage-val">-</span>
    </div>
</div>
