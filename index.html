    async function fetchCharactersData() {
    try {
        const response = await fetch('characters.json');

        const text = await response.text();

        try {
            characterDb = JSON.parse(text);
            console.log("✓ JSON 스키마 매핑 완료");
        } catch (e) {
            console.error(e);

            const pos = Number(
                e.message.match(/position (\d+)/)?.[1]
            );

            if (!Number.isNaN(pos)) {
                console.log("Around error:");
                console.log(text.slice(pos - 100, pos + 100));
            }
        }
    } catch (e) {
        console.error("Fetch 실패:", e);
    }
}
