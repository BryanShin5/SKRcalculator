<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데미지 계산기 (가로 분리 레이아웃)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 800px; /* 가로 배치를 위해 전체 카드 카드 최대 너비를 확장 */
            width: 100%;
        }
        h1 { color: #2c3e50; font-size: 24px; text-align: center; margin-top: 0; margin-bottom: 5px; }
        .status { color: #27ae60; font-weight: bold; text-align: center; margin-bottom: 25px; font-size: 14px; }
        
        /* 공격자와 방어자를 가로로 배치하기 위한 그리드 컨테이너 */
        .flex-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 15px;
        }

        /* 세션 분리를 위한 서브 타이틀 스타일 */
        .section-title {
            font-size: 16px;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #eef2f3;
            font-weight: bold;
        }

        label { font-size: 13px; color: #5a738e; display: block; margin-top: 10px; font-weight: bold; }
        select, input, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
        }
        button:hover { background-color: #2980b9; }
        .result {
            margin-top: 20px;
            font-size: 16px;
            color: #333;
            background: #eef2f3;
            padding: 15px;
            border-radius: 6px;
            line-height: 1.6;
        }
        .damage-val {
            color: #e74c3c;
            font-size: 20px;
            font-weight: bold;
        }

        /* 화면이 좁은 모바일 기기에서는 세로로 자동 전환 */
        @media (max-width: 600px) {
            .flex-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⚔️ 세븐나이츠 키우기 계산기</h1>
    <p class="status">✓ 실시간 서버리스 시뮬레이터</p>
    
    <!-- 가로 배치를 위한 컨테이너 시작 -->
    <div class="flex-container">
        
        <!-- ==================== 좌측: 공격자 입력 섹션 ==================== -->
        <div class="column">
            <div class="section-title">🔴 공격자 설정 (Attacker)</div>

            <label for="stat_name">캐릭터 이름</label>
            <input type="text" id="stat_name" value="에반" oninput="calculateDamage()">

            <label for="eq_set">장비 세트효과</label>
            <select id="eq_set" onchange="calculateDamage()">
                <option value="none" data-weak-dmg="0" data-ignore-def="0" data-wpn-dmg="0">없음</option>
                <option value="chase" data-weak-dmg="30" data-ignore-def="0" data-wpn-dmg="0">추적 (+30% 약점 공격 피해량)</option>
                <option value="assassin" data-weak-dmg="0" data-ignore-def="15" data-wpn-dmg="0">암살 (+15% 방어력 무시)</option>
                <option value="avenger" data-weak-dmg="0" data-ignore-def="0" data-wpn-dmg="70">복수자 (+70% 피해 증폭)</option>
            </select>

            <label for="acc1">장신구1</label>
            <select id="acc1" onchange="calculateDamage()">
                <option value="crit" data-crit="10" data-weak-rate="0" data-wpn-dmg="0">치확 (+10% 치확)</option>
                <option value="weak" data-crit="0" data-weak-rate="12" data-wpn-dmg="0">약공 (+12% 약공 확률)</option>
                <option value="subjugate" data-crit="0" data-weak-rate="0" data-wpn-dmg="12">토벌 (+12% 피해 증폭)</option>
                <option value="siege" data-crit="0" data-weak-rate="0" data-wpn-dmg="10">공성 (+10% 피해 증폭)</option>
                <option value="dmg" data-crit="0" data-weak-rate="0" data-wpn-dmg="6">피증 (+6% 피해 증폭)</option>
            </select>

            <label for="acc2">장신구2</label>
            <select id="acc2" onchange="calculateDamage()">
                <option value="none" data-crit="0" data-weak-rate="0" data-wpn-dmg="0">장비 없음</option>
                <option value="crit" data-crit="10" data-weak-rate="0" data-wpn-dmg="0">치확 (+10% 치확)</option>
                <option value="weak" data-crit="0" data-weak-rate="12" data-wpn-dmg="0">약공 (+12% 약공 확률)</option>
                <option value="subjugate" data-crit="0" data-weak-rate="0" data-wpn-dmg="12">토벌 (+12% 피해 증폭)</option>
                <option value="siege" data-crit="0" data-weak-rate="0" data-wpn-dmg="10">공성 (+10% 피해 증폭)</option>
                <option value="dmg" data-crit="0" data-weak-rate="0" data-wpn-dmg="6">피증 (+6% 피해 증폭)</option>
            </select>

            <label for="atk">기본 공격력 (Base ATK)</label>
            <input type="number" id="atk" value="1500" min="0" oninput="calculateDamage()">

            <label for="crit-rate">기본 치명타 확률 (치확 %)</label>
            <input type="number" id="crit-rate" value="50" min="0" max="100" oninput="calculateDamage()">

            <label for="crit-dmg">치명타 피해 (치피 %)</label>
            <input type="number" id="crit-dmg" value="150" min="0" oninput="calculateDamage()">

            <label for="weak-atk">약점 공격 확률 (약공 %)</label>
            <input type="number" id="weak-atk" value="20" min="0" max="100" oninput="calculateDamage()">

            <label for="dmg-buff">전장 증폭 (%)</label>
            <input type="number" id="dmg-buff" value="10" min="0" oninput="calculateDamage()">
        </div>

        <!-- ==================== 우측: 방어자 입력 섹션 ==================== -->
        <div class="column">
            <div class="section-title">🔵 방어자 설정 (Defender)</div>

            <label for="stat_name">캐릭터 이름</label>
            <input type="text" id="stat_name" value="에반" oninput="calculateDamage()">

            <label for="def">적 방어력</label>
            <input type="number" id="def" value="500" min="0" oninput="calculateDamage()">

            <label for="def">적 체력</label>
            <input type="number" id="def" value="500" min="0" oninput="calculateDamage()">

            <label for="def">적 막기</label>
            <input type="number" id="def" value="500" min="0" oninput="calculateDamage()">

            <label for="def">적 받피감</label>
            <input type="number" id="def" value="500" min="0" oninput="calculateDamage()">

            <label for="def">적 탄성</label>
            <input type="number" id="def" value="500" min="0" oninput="calculateDamage()">

            <label for="def">적 방어력</label>
            <input type="number" id="def" value="500" min="0" oninput="calculateDamage()">
        </div>

    </div>
    <!-- 가로 배치를 위한 컨테이너 끝 -->

    <!-- ==================== 하단: 결과창 및 실행 버튼 ==================== -->
    <button onclick="calculateDamage()">데미지 계산하기</button>

    <div class="result" id="output">
        스탯을 입력하면 분석 결과가 여기에 표시됩니다.
    </div>
</div>

<script>
    function calculateDamage() {
        const charName = document.getElementById('stat_name').value || "캐릭터";

        // 드롭다운 노드 선택
        const eqSetOpt = document.getElementById('eq_set').options[document.getElementById('eq_set').selectedIndex];
        const acc1Opt = document.getElementById('acc1').options[document.getElementById('acc1').selectedIndex];
        const acc2Opt = document.getElementById('acc2').options[document.getElementById('acc2').selectedIndex];

        // 장비 데이터 추출
        const bonusWeakDmg = parseFloat(eqSetOpt.getAttribute('data-weak-dmg')) || 0;
        const bonusIgnoreDef = parseFloat(eqSetOpt.getAttribute('data-ignore-def')) || 0;
        
        const bonusCritRate = (parseFloat(acc1Opt.getAttribute('data-crit')) || 0) + (parseFloat(acc2Opt.getAttribute('data-crit')) || 0);
        const bonusWeakRate = (parseFloat(acc1Opt.getAttribute('data-weak-rate')) || 0) + (parseFloat(acc2Opt.getAttribute('data-weak-rate')) || 0);
        const bonusAmp = (parseFloat(eqSetOpt.getAttribute('data-wpn-dmg')) || 0) + 
                         (parseFloat(acc1Opt.getAttribute('data-wpn-dmg')) || 0) + 
                         (parseFloat(acc2Opt.getAttribute('data-wpn-dmg')) || 0);

        // 공격자 최종 수치 연산
        const finalAtk = parseFloat(document.getElementById('atk').value) || 0;

        const baseCritRate = parseFloat(document.getElementById('crit-rate').value) || 0;
        const finalCritRate = Math.min(baseCritRate + bonusCritRate, 100) / 100;
        const critDmgMultiplier = (parseFloat(document.getElementById('crit-dmg').value) || 0) / 100;

        const baseWeakRate = parseFloat(document.getElementById('weak-atk').value) || 0;
        const finalWeakRate = Math.min(baseWeakRate + bonusWeakRate, 100) / 100;
        const weakDmgMultiplier = 1.5 + (bonusWeakDmg / 100); 

        const baseAmp = parseFloat(document.getElementById('dmg-buff').value) || 0;
        const finalAmpMultiplier = 1 + ((baseAmp + bonusAmp) / 100);
        
        // 방어자 최종 수치 연산 (방어도 무시 적용)
        const enemyDef = parseFloat(document.getElementById('def').value) || 0;
        const finalEnemyDef = enemyDef * (1 - (bonusIgnoreDef / 100));

        // 데미지 시뮬레이션
        let baseDamage = finalAtk - (finalEnemyDef * 0.5);
        if (baseDamage < 1) baseDamage = 1;
        baseDamage = baseDamage * finalAmpMultiplier;

        const normalDmg = baseDamage;
        const critDmg = baseDamage * critDmgMultiplier;
        const weakDmg = baseDamage * weakDmgMultiplier;
        const weakCritDmg = baseDamage * critDmgMultiplier * weakDmgMultiplier;

        // 독립 복합 기댓값 확률 연산
        const pNormal = (1 - finalCritRate) * (1 - finalWeakRate);
        const pCrit = finalCritRate * (1 - finalWeakRate);
        const pWeak = (1 - finalCritRate) * finalWeakRate;
        const pWeakCrit = finalCritRate * finalWeakRate;

        const avgDamage = (normalDmg * pNormal) + (critDmg * pCrit) + (weakDmg * pWeak) + (weakCritDmg * pWeakCrit);

        // UI 결과 바인딩
        document.getElementById('output').innerHTML = `
            <strong>[${charName}]</strong> 전투 분석 결과:<br>
